apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "haai.fullname" . }}
  labels:
    {{- include "haai.labels" . | nindent 4 }}
data:
  {{- $defaultConfig := dict "HAAI_HOST" "0.0.0.0" "HAAI_PORT" "8787" "HAAI_DATA_DIR" "/data" "HAAI_RESTART_MODE" "direct" "HAAI_DEPLOYMENT_MODE" "container" "HAAI_UPDATE_APPLY_MODE" "direct" -}}
  {{- $config := mergeOverwrite $defaultConfig (.Values.config | default dict) -}}
  {{- range $key, $value := $config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
