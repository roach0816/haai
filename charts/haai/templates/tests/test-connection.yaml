apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "haai.fullname" . }}-test-connection"
  labels:
    {{- include "haai.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: health
      image: node:22-bookworm-slim
      command:
        - node
        - -e
        - "fetch('http://{{ include "haai.fullname" . }}:{{ .Values.service.port }}/api/system/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
