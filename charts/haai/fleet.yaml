defaultNamespace: haai
namespace: haai

helm:
  releaseName: haai
  timeoutSeconds: 600
  values:
    image:
      repository: ghcr.io/roach0816/haai
      tag: ""
      pullPolicy: IfNotPresent
      pullSecrets: []

    persistence:
      enabled: true
      size: 5Gi
      mountPath: /data

    config:
      HAAI_HOST: "0.0.0.0"
      HAAI_PORT: "8787"
      HAAI_DATA_DIR: /data
      HAAI_RESTART_MODE: direct
      HAAI_DEPLOYMENT_MODE: container
      HAAI_UPDATE_APPLY_MODE: direct
      HAAI_TRUST_PROXY: "true"

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
