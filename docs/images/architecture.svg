<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">HAAI Deployment Architecture</title>
  <desc id="desc">User traffic flows through an optional proxy to HAAI and persistent storage. Kubernetes uses optional Ingress, Service, Pod, PVC, and user-selected StorageClass.</desc>
  <style>
    text { font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .store { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.5; rx: 8; }
    .group { fill: none; stroke: #cbd5e1; stroke-width: 1.5; stroke-dasharray: 6 6; rx: 10; }
    .arrow { stroke: #475569; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    .label { font-size: 12px; fill: #475569; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
  </defs>
  <rect class="box" x="30" y="45" width="120" height="54" />
  <text x="90" y="77" text-anchor="middle">User</text>
  <rect class="box" x="190" y="35" width="170" height="74" />
  <text x="275" y="66" text-anchor="middle">Optional proxy,</text>
  <text x="275" y="86" text-anchor="middle">Ingress, or Tunnel</text>
  <rect class="box" x="400" y="35" width="160" height="74" />
  <text x="480" y="66" text-anchor="middle">Port mapping</text>
  <text x="480" y="86" text-anchor="middle">or Service</text>
  <rect class="box" x="600" y="45" width="120" height="54" />
  <text x="660" y="77" text-anchor="middle">HAAI</text>
  <rect class="store" x="760" y="45" width="130" height="54" />
  <text x="825" y="77" text-anchor="middle">/data storage</text>
  <path class="arrow" d="M150 72 H190" />
  <path class="arrow" d="M360 72 H400" />
  <path class="arrow" d="M560 72 H600" />
  <path class="arrow" d="M720 72 H760" />

  <rect class="group" x="30" y="150" width="860" height="160" />
  <text class="label" x="50" y="178">Kubernetes path</text>
  <rect class="box" x="70" y="210" width="120" height="54" />
  <text x="130" y="242" text-anchor="middle">Ingress</text>
  <rect class="box" x="230" y="210" width="120" height="54" />
  <text x="290" y="242" text-anchor="middle">Service</text>
  <rect class="box" x="390" y="210" width="120" height="54" />
  <text x="450" y="242" text-anchor="middle">Pod</text>
  <rect class="store" x="550" y="210" width="120" height="54" />
  <text x="610" y="242" text-anchor="middle">PVC</text>
  <rect class="store" x="710" y="210" width="140" height="54" />
  <text x="780" y="234" text-anchor="middle">User-selected</text>
  <text x="780" y="254" text-anchor="middle">StorageClass</text>
  <path class="arrow" d="M190 237 H230" />
  <path class="arrow" d="M350 237 H390" />
  <path class="arrow" d="M510 237 H550" />
  <path class="arrow" d="M670 237 H710" />
</svg>
