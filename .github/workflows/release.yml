name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Package release
        run: npm run release:package -- --version-label="${GITHUB_REF_NAME#v}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/haai-"${GITHUB_REF_NAME#v}".tgz release/haai-"${GITHUB_REF_NAME#v}".tgz.sha256 --clobber
          else
            gh release create "$GITHUB_REF_NAME" release/haai-"${GITHUB_REF_NAME#v}".tgz release/haai-"${GITHUB_REF_NAME#v}".tgz.sha256 --title "$GITHUB_REF_NAME" --notes "Home Assistant AI appliance release $GITHUB_REF_NAME"
          fi
