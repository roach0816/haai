name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Validate Docker Compose
        run: |
          docker compose config --quiet
          docker compose -f compose.yaml -f compose.build.yaml config --quiet

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Validate Helm chart
        run: |
          helm lint charts/haai
          helm template haai charts/haai >/tmp/haai-default.yaml
          helm template haai charts/haai -f deploy/examples/values.example.yaml >/tmp/haai-example.yaml
          grep -q "strategy:" /tmp/haai-default.yaml
          grep -q "type: Recreate" /tmp/haai-default.yaml
          grep -q "/api/system/health" /tmp/haai-default.yaml

      - name: Package release
        run: npm run release:package -- --version-label="${GITHUB_REF_NAME#v}"

      - name: Package deployment artifacts
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p release/charts
          helm package charts/haai --version "$version" --app-version "$version" --destination release/charts
          mv "release/charts/haai-${version}.tgz" "release/haai-chart-${version}.tgz"
          cp compose.yaml release/compose.yaml
          cp .env.example release/env.example
          sha256sum "release/haai-${version}.tgz" \
            "release/haai-chart-${version}.tgz" \
            release/compose.yaml \
            release/env.example > release/deployment-artifacts.sha256

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git log -1 --pretty=%B "$GITHUB_SHA" > release-notes.md
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
            gh release upload "$GITHUB_REF_NAME" \
              release/haai-"${GITHUB_REF_NAME#v}".tgz \
              release/haai-"${GITHUB_REF_NAME#v}".tgz.sha256 \
              release/haai-chart-"${GITHUB_REF_NAME#v}".tgz \
              release/compose.yaml \
              release/env.example \
              release/deployment-artifacts.sha256 \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              release/haai-"${GITHUB_REF_NAME#v}".tgz \
              release/haai-"${GITHUB_REF_NAME#v}".tgz.sha256 \
              release/haai-chart-"${GITHUB_REF_NAME#v}".tgz \
              release/compose.yaml \
              release/env.example \
              release/deployment-artifacts.sha256 \
              --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
            SOURCE=https://github.com/${{ github.repository }}
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Log in Helm to GitHub Container Registry
        run: echo "${{ github.token }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Push Helm chart to GHCR
        run: helm push "release/haai-chart-${GITHUB_REF_NAME#v}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"
