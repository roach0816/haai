ingress:
  enabled: true
  className: ""
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

config:
  HAAI_TRUST_PROXY: "true"

persistence:
  enabled: true
  size: 5Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
