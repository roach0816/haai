# Copy these values into your own private Fleet bundle, private branch, or Rancher
# values override when you need cluster-specific networking and storage settings.

existingSecret: haai-secrets

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: haai.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: haai-tls
      hosts:
        - haai.example.com

persistence:
  enabled: true
  storageClass: nfs-client
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  mountPath: /data

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
